<svg width="680" height="260" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Lane Dodger finite state machine</title>
<desc>Three states: Menu, Playing, and Game Over. Menu transitions to Playing on button click. Playing transitions to Game Over on collision. Game Over transitions back to Menu on button click.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="680" height="260" fill="#FFFFFF"/>

<g>
  <rect x="40" y="100" width="160" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="120" y="118" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Menu</text>
  <text x="120" y="136" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">Idle, waiting for input</text>
</g>

<g>
  <rect x="260" y="100" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="118" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Playing</text>
  <text x="340" y="136" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">Obstacles scroll, score climbs</text>
</g>

<g>
  <rect x="480" y="100" width="160" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="560" y="118" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Game over</text>
  <text x="560" y="136" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712B13">Final score shown</text>
</g>

<line x1="200" y1="128" x2="258" y2="128" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="229" y="110" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">click</text>

<line x1="420" y1="128" x2="478" y2="128" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="449" y="110" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">collision</text>

<path d="M560 156 C560 210, 120 210, 120 156" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="340" y="225" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">click (restart)</text>

</svg>
