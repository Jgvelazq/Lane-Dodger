<svg width="680" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Lane Dodger module dependency diagram</title>
<desc>Four modules in a one-way dependency chain: input depends on nothing, obstacles depends on input for the Lane type, game_state depends on both input and obstacles, and display depends on game_state and obstacles. Dependencies only flow left to right; nothing depends back on display.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="680" height="200" fill="#FFFFFF"/>

<g>
  <rect x="30" y="80" width="130" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="95" y="100" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">input</text>
  <text x="95" y="118" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0C447C">joystick, debounce</text>
</g>

<g>
  <rect x="195" y="80" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="260" y="100" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">obstacles</text>
  <text x="260" y="118" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">spawn, scroll</text>
</g>

<g>
  <rect x="360" y="80" width="130" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="425" y="100" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#412402">game_state</text>
  <text x="425" y="118" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#633806">the FSM</text>
</g>

<g>
  <rect x="525" y="80" width="130" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="590" y="100" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">display</text>
  <text x="590" y="118" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#712B13">LCD rendering</text>
</g>

<line x1="160" y1="108" x2="193" y2="108" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="325" y1="108" x2="358" y2="108" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="490" y1="108" x2="523" y2="108" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<text x="340" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#444441">Dependencies flow one way only -- nothing depends back on display</text>

</svg>
